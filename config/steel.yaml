# Steel vertical configuration (v1).
# All series IDs, HS codes, event keywords, and horizons live here so a new
# vertical is just a new YAML file, no code changes.

vertical: steel

target:
  # Primary forecast target. HRC futures are the ideal target; SLX (steel ETF)
  # is the clean, liquid public proxy used for v1.
  symbol: SLX          # yfinance ticker
  field: Close
  frequency: B         # business-day

macro:                 # FRED series IDs used as context / v2 covariates
  steel_ppi: WPU101    # PPI: iron and steel
  industrial_production: INDPRO
  import_price_index: IR
  usd_index: DTWEXBGS   # trade-weighted USD index

trade:                 # US Census international trade
  hs_codes: ["72", "7208", "7210"]   # iron & steel, flat-rolled
  flow: imports

shipping:
  index: FBX           # Freightos Baltic Index (container); Baltic Dry as fallback

events:
  # Federal Register query anchors (authoritative, timestamped).
  # Focused terms + high-signal document types (Presidential proclamations, rules,
  # notices). Restricting by type, not agency, keeps the Section 232 steel
  # proclamations (Presidential documents) in scope.
  # Proclamations (PRESDOCU) + rules (RULE) are few and complete across all years,
  # so they span 2018-2026 without the newest-N cap crowding out old events. NOTICE-type
  # antidumping/countervailing determinations are high-volume and low-signal for price
  # shocks, so they are deliberately excluded from v1 (a known precision/recall tradeoff).
  federal_register:
    terms: ["steel 232 tariff", "adjusting imports of steel"]
    document_types: ["PRESDOCU", "RULE"]
    start: "2017-01-01"
    max_events: 250
  news:
    keywords: ["steel tariff", "steel import", "trade dispute", "export control"]
  # Prototype "shock" sentences that events are scored against for relevance.
  shock_prototypes:
    - "New tariff imposed on steel imports effective immediately."
    - "Section 232 duties on steel raised."
    - "Antidumping duty order issued on steel products."
    - "Export restrictions announced affecting steel supply."

forecast:
  horizon_days: 10           # forecast horizon
  context_days: 1024         # history fed to the foundation model (TimesFM max_context)
  quantiles: [0.1, 0.5, 0.9] # TimesFM deciles; CQR widens q10/q90 to the 90% target

calibration:
  method: split_conformal
  target_coverage: 0.90      # nominal interval coverage
  calib_fraction: 0.2        # tail of history held out for conformal calibration

detection:
  changepoint_method: pelt   # or: bocpd
  cost_model: l2             # l2 on rolling volatility finds regime breaks
  vol_window: 20             # rolling window (days) for volatility
  penalty: 8                 # PELT penalty (tuned to ~14 regime breaks over 2017-2026)
  breach_min_run: 1          # consecutive out-of-interval points to flag

attribution:
  lookback_days: 14          # window of events considered for a breach
  weights:                   # relevance x severity x recency
    relevance: 0.5
    severity: 0.3
    recency: 0.2
  top_k: 3

backtest:
  holdout_months: 6          # frozen holdout never seen in development
  rolling: expanding         # rolling-origin scheme
  step_days: 5
